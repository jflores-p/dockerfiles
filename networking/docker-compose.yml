networks:
  main_network:
    name: "main_network"
    ipam:
      config:
        - subnet: 10.8.1.0/24
          gateway: 10.8.1.1

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    #labels:
    #  - "com.centurylinklabs.watchtower.enable=false"
    environment:
      # / Change the Web UI Password:
      FTLCONF_webserver_api_password: ${FTLCONF_webserver_api_password}
      TZ: "America/Lima"
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_dns_upstreams: "10.8.1.3#10002"
    volumes:
      - './pihole/pihole:/etc/pihole'
      - './pihole/dnsmasq:/etc/dnsmasq.d'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "10001:80/tcp"
      - "10000:443/tcp"
    restart: unless-stopped
    networks:
      main_network:
        ipv4_address: 10.8.1.252

  unbound: 
    image: mvance/unbound-rpi:latest # remember to change this if you're using rpi
    container_name: unbound
    hostname: unbound
    volumes:
      - './unbound:/opt/unbound/etc/unbound'
    ports:
      - "10002:53/tcp"
      - "10002:53/udp"
    healthcheck:
      test: ["NONE"]
    restart: unless-stopped
    networks:
      main_network: 
        ipv4_address: 10.8.1.253

  wireguard:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wireguard
    hostname: wireguard
    environment:
      # ⚠️ Change the server's hostname (clients will connect to):
      WG_HOST: ${WG_HOST}  #no-ip
      # ⚠️ Change the Web UI Password:
      PASSWORD_HASH: ${PASSWORD_HASH}

      # 💡 This is the Pi-Hole Container's IP Address
      WG_DEFAULT_DNS: ${WG_DEFAULT_DNS}
      WG_DEFAULT_ADDRESS: ${WG_DEFAULT_ADDRESS}
    volumes:
      - './wireguard:/etc/wireguard'
    ports:
      - "10003:51820/udp" #port forwarding
      - "10004:51821/tcp" #web console
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      main_network:
        ipv4_address: 10.8.1.254

  proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    hostname: nginx-proxy-manager
    ports:
      # These ports are in format <host-port>:<container-port>
      - '10008:81' # Admin Web Port
      - '80:80' # Public HTTP Port
      - '443:443' # Public HTTPS Port
        #- '10009:80' # Public HTTP Port
        #- '10010:443' # Public HTTPS Port
      # Add any other Stream port you want to expose
      # - '21:21' # FTP
    environment:
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./proxy-manager/data:/data
      - ./proxy-manager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
    depends_on:
      pihole:
        condition: service_started
      unbound:
        condition: service_started
      wireguard:
        condition: service_started
    restart: unless-stopped
    networks:
      main_network:

  noip-duc:
    image: noipcom/noip-duc:3.2.0
    container_name: noip-duc
    hostname: noip-duc
    environment:
      - NOIP_USERNAME=${NOIP_USERNAME}
      - NOIP_PASSWORD=${NOIP_PASSWORD}
      - NOIP_HOSTNAMES=${NOIP_HOSTNAMES}
    depends_on:
      pihole:
        condition: service_started
      unbound:
        condition: service_started
      wireguard:
        condition: service_started
    restart: unless-stopped
    profiles:
        - skip
    networks:
      main_network:

  cloudflare-ddns:
    image: timothyjmiller/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    hostname: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./cloudflare/cloudflare-ddns-config.json:/config.json
    depends_on:
      pihole:
        condition: service_started
      unbound:
        condition: service_started
      wireguard:
        condition: service_started
    restart: unless-stopped
    network_mode: "host"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudfare-tunnel
    hostname: cloudfare-tunnel
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    profiles:
      - skip
    depends_on:
      pihole:
        condition: service_started
      unbound:
        condition: service_started
      wireguard:
        condition: service_started
    networks:
      main_network:

  myspeed:
    image: germannewsmaker/myspeed
    container_name: myspeed
    hostname: myspeed
    ports:
      - "10017:5216"
    volumes:
      - ./myspeed:/myspeed/data
    depends_on:
      pihole:
        condition: service_started
      unbound:
        condition: service_started
      wireguard:
        condition: service_started
    restart: unless-stopped
    networks:
      main_network:
