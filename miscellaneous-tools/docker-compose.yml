networks:
  main_network:
    external: true

services:
  homepage:
    image: nginx:alpine
    container_name: miscellaneous-homepage
    hostname: homepage
    environment:
      TZ: "America/Lima"
    ports:
      - "8050:80"
    volumes:
      - "./homepage:/usr/share/nginx/html:ro"
    restart: unless-stopped
    networks:
      main_network:

  composerize:
    image: oaklight/composerize:latest
    container_name: miscellaneous-composerize
    hostname: composerize
    ports:
      - "8051:80"
    restart: unless-stopped
    networks:
      main_network:
          
  snippet-box:
    image: pawelmalak/snippet-box:arm
    container_name: miscellaneous-snippets
    hostname: snippet-box
    environment:
      TZ: "America/Lima"
    ports:
      - "8052:5000"
    volumes:
      - "./snippet-box:/app/data"
    restart: unless-stopped
    networks:
      main_network:
