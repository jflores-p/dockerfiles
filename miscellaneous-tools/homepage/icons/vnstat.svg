<svg width="250" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bar-green { fill: #92cf00; }
    .bar-black { fill: #606060; }
  </style>

  <!-- Axes -->
  <line x1="20" y1="10" x2="20" y2="180" stroke="#000" stroke-width="1" />
  <line x1="20" y1="180" x2="230" y2="180" stroke="#000" stroke-width="1" />

  <!-- Bars -->
  <rect x="40" y="80" width="40" height="100" class="bar-green" />
  <rect x="65" y="110" width="40" height="70" class="bar-black" />

  <rect x="130" y="20" width="40" height="160" class="bar-green" />
  <rect x="155" y="80" width="40" height="100" class="bar-black" />
</svg>

