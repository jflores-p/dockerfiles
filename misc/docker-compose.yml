networks:
  main_network:
    external: true

services:
  first-homepage:
    image: nginx:alpine
    container_name: first-homepage
    hostname: first-homepage
    environment:
      TZ: "America/Lima"
    ports:
      - "10011:80"
    volumes:
      - "./first-homepage:/usr/share/nginx/html:ro"
    restart: unless-stopped
    profiles:
        - skip
    networks:
      main_network:
          
  snippet-box:
    image: pawelmalak/snippet-box:arm
    container_name: snippets
    hostname: snippet-box
    environment:
      TZ: "America/Lima"
    ports:
      - "10012:5000"
    volumes:
      - "./snippet-box:/app/data"
    restart: unless-stopped
    networks:
      main_network:

  composerize:
    image: oaklight/composerize:latest
    container_name: composerize
    hostname: composerize
    ports:
      - "10013:80"
    restart: unless-stopped
    networks:
      main_network:

  paperless-broker:
    image: docker.io/library/redis:7
    container_name: paperless-broker
    hostname: paperless-broker
    volumes:
      - ./paperless/redisdata:/data
    restart: unless-stopped
    networks:
      main_network:

  paperless-webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ws
    hostname: paperless-ws
    depends_on:
      - paperless-broker
      - paperless-gotenberg
      - paperless-tika
    ports:
      - "10015:8000"
    volumes:
      - ./paperless/data:/usr/src/paperless/data
      - ./paperless/media:/usr/src/paperless/media
      - ./paperless/export:/usr/src/paperless/export
      - ./paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_URL: https://paperless.joakolabs.com
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
    restart: unless-stopped
    networks:
      main_network:
        
  paperless-gotenberg:
    image: docker.io/gotenberg/gotenberg:8.22
    container_name: paperless-gotenberg
    hostname: paperless-gotenberg
    restart: unless-stopped
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      main_network:

  paperless-tika:
    image: docker.io/apache/tika:latest
    container_name: paperless-tika
    hostname: paperless-tika
    restart: unless-stopped
    networks:
      main_network:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    ports:
      - "10016:3000"
    volumes:
      - ./homepage/config:/app/config # Make sure your local config directory exists
      - ./homepage/icons:/app/public/icons
      - ./homepage/images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations, see alternative methods
    environment:
      HOMEPAGE_ALLOWED_HOSTS: gethomepage.dev,homepage.joakolabs.com,pi.local:10016 # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: 1000
      PGID: 1000
    restart: always
    networks:
      main_network:

  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    hostname: filebrowser
    ports:
      - "10019:80"
    volumes:
      - ./paperless/media/documents/archive:/srv
      - ./filebrowser/database:/database
      - ./filebrowser/config:/config
    environment:
      PUID: $(id -u)
      PGID: $(id -g)
    restart: always
    networks:
      main_network:

  karakeep-web:
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep-web
    hostname: karakeep-web
    volumes:
      # By default, the data is stored in a docker volume called "data".
      # If you want to mount a custom directory, change the volume mapping to:
      # - /path/to/your/directory:/data
      - ./karakeep/data:/data
    ports:
      - 10020:3000
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://karakeep-meilisearch:7700
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      # OPENAI_API_KEY: ...

      # You almost never want to change the value of the DATA_DIR variable.
      # If you want to mount a custom directory, change the volume mapping above instead.
      DATA_DIR: /data # DON'T CHANGE THIS
    restart: always
    networks:
      main_network:

  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    hostname: karakeep-chrome
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    restart: always
    networks:
      main_network:

  karakeep-meilisearch:
    image: getmeili/meilisearch:v1.37.0
    container_name: karakeep-meilisearch
    hostname: karakeep-meilisearch
    volumes:
      - ./karakeep/meiliesarch:/meili_data
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
    restart: always
    networks:
      main_network:

